services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobpilot}
      POSTGRES_USER: ${POSTGRES_USER:-jobpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpilot}
    volumes:
      - jobpilot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jobpilot}
      POSTGRES_USER: ${POSTGRES_USER:-jobpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpilot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_COMMANDS_ENABLED: ${TELEGRAM_COMMANDS_ENABLED:-false}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:-}
      TELEGRAM_ALLOWED_USER_ID: ${TELEGRAM_ALLOWED_USER_ID:-}
      TELEGRAM_POLL_TIMEOUT: ${TELEGRAM_POLL_TIMEOUT:-25s}
      TELEGRAM_POLL_DELAY: ${TELEGRAM_POLL_DELAY:-2s}
      TELEGRAM_POLL_LIMIT: ${TELEGRAM_POLL_LIMIT:-50}
      TELEGRAM_MAX_UPDATE_FAILURES: ${TELEGRAM_MAX_UPDATE_FAILURES:-3}
      TELEGRAM_DISCARD_PENDING_ON_FIRST_START: ${TELEGRAM_DISCARD_PENDING_ON_FIRST_START:-true}
      GREENHOUSE_BOARD_TOKENS: ${GREENHOUSE_BOARD_TOKENS:-}
      LEVER_COMPANY_IDS: ${LEVER_COMPANY_IDS:-}
      JOB_FETCH_CRON: ${JOB_FETCH_CRON:-0 0 */6 * * *}
      DAILY_DIGEST_CRON: ${DAILY_DIGEST_CRON:-0 0 9 * * *}
      STALE_DAYS: ${STALE_DAYS:-30}
      MANUAL_URL_CONNECT_TIMEOUT: ${MANUAL_URL_CONNECT_TIMEOUT:-5s}
      MANUAL_URL_RESPONSE_TIMEOUT: ${MANUAL_URL_RESPONSE_TIMEOUT:-15s}
      MANUAL_URL_MAX_REDIRECTS: ${MANUAL_URL_MAX_REDIRECTS:-3}
      MANUAL_URL_MAX_RESPONSE_BYTES: ${MANUAL_URL_MAX_RESPONSE_BYTES:-1048576}
      MANUAL_URL_MAX_TITLE_LENGTH: ${MANUAL_URL_MAX_TITLE_LENGTH:-500}
      MANUAL_URL_MAX_DESCRIPTION_LENGTH: ${MANUAL_URL_MAX_DESCRIPTION_LENGTH:-100000}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_CONNECT_TIMEOUT: ${LLM_CONNECT_TIMEOUT:-5s}
      LLM_RESPONSE_TIMEOUT: ${LLM_RESPONSE_TIMEOUT:-60s}
      LLM_MAX_INPUT_TOKENS: ${LLM_MAX_INPUT_TOKENS:-}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_REQUEST_BUDGET_USD: ${LLM_REQUEST_BUDGET_USD:-}
      LLM_DAILY_BUDGET_USD: ${LLM_DAILY_BUDGET_USD:-}
      LLM_MONTHLY_BUDGET_USD: ${LLM_MONTHLY_BUDGET_USD:-}
      LLM_INPUT_COST_PER_MILLION_TOKENS: ${LLM_INPUT_COST_PER_MILLION_TOKENS:-}
      LLM_OUTPUT_COST_PER_MILLION_TOKENS: ${LLM_OUTPUT_COST_PER_MILLION_TOKENS:-}
    ports:
      - "127.0.0.1:${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  jobpilot-postgres:
