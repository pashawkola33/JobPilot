spring:
  config:
    import: classpath:candidate-profile.yml
  application:
    name: jobpilot
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jobpilot}
    username: ${POSTGRES_USER:jobpilot}
    password: ${POSTGRES_PASSWORD:jobpilot}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 20s
server:
  shutdown: graceful
  port: ${PORT:8080}
logging:
  level:
    root: INFO
    com.jobpilot: INFO
    org.springframework.web.reactive.function.client: WARN
    org.apache.pdfbox.pdmodel.font.FileSystemFontProvider: OFF

jobpilot:
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    channel-id: ${TELEGRAM_CHANNEL_ID:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
    commands-enabled: ${TELEGRAM_COMMANDS_ENABLED:false}
    allowed-chat-id: ${TELEGRAM_ALLOWED_CHAT_ID:}
    allowed-user-id: ${TELEGRAM_ALLOWED_USER_ID:}
    poll-timeout: ${TELEGRAM_POLL_TIMEOUT:25s}
    poll-delay: ${TELEGRAM_POLL_DELAY:2s}
    poll-limit: ${TELEGRAM_POLL_LIMIT:50}
    max-update-failures: ${TELEGRAM_MAX_UPDATE_FAILURES:3}
    discard-pending-on-first-start: ${TELEGRAM_DISCARD_PENDING_ON_FIRST_START:true}
  sources:
    greenhouse-board-tokens: ${GREENHOUSE_BOARD_TOKENS:}
    lever-company-ids: ${LEVER_COMPANY_IDS:}
  candidate:
    home-country: Romania
    preferred-locations: [Bucharest, București, Romania, Remote Romania]
    backend-skills: [Java, Spring Boot, REST, SQL, PostgreSQL, JPA, Maven, JUnit]
    supporting-skills: [React, TypeScript, JavaScript, HTML, CSS, Git, CI/CD, GitHub Actions]
    current-student: true
    final-year-student: false
    commercial-java-years: 0
  http:
    connect-timeout: 5s
    response-timeout: 20s
    max-response-bytes: 2097152
  manual-url:
    connect-timeout: ${MANUAL_URL_CONNECT_TIMEOUT:5s}
    response-timeout: ${MANUAL_URL_RESPONSE_TIMEOUT:15s}
    max-redirects: ${MANUAL_URL_MAX_REDIRECTS:3}
    max-response-bytes: ${MANUAL_URL_MAX_RESPONSE_BYTES:1048576}
    max-title-length: ${MANUAL_URL_MAX_TITLE_LENGTH:500}
    max-description-length: ${MANUAL_URL_MAX_DESCRIPTION_LENGTH:100000}
  llm:
    enabled: ${LLM_ENABLED:false}
    provider: ${LLM_PROVIDER:}
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    connect-timeout: ${LLM_CONNECT_TIMEOUT:5s}
    response-timeout: ${LLM_RESPONSE_TIMEOUT:60s}
    max-input-tokens: ${LLM_MAX_INPUT_TOKENS:}
    max-output-tokens: ${LLM_MAX_OUTPUT_TOKENS:}
    max-retries: ${LLM_MAX_RETRIES:1}
    request-budget-usd: ${LLM_REQUEST_BUDGET_USD:}
    daily-budget-usd: ${LLM_DAILY_BUDGET_USD:}
    monthly-budget-usd: ${LLM_MONTHLY_BUDGET_USD:}
    input-cost-per-million-tokens: ${LLM_INPUT_COST_PER_MILLION_TOKENS:}
    output-cost-per-million-tokens: ${LLM_OUTPUT_COST_PER_MILLION_TOKENS:}
  documents:
    enabled: ${DOCUMENTS_ENABLED:false}
    storage-root: ${DOCUMENT_STORAGE_ROOT:./data/documents}
    max-docx-bytes: ${DOCUMENT_MAX_DOCX_BYTES:2097152}
    max-pdf-bytes: ${DOCUMENT_MAX_PDF_BYTES:2097152}
    resume-template-version: ${DOCUMENT_RESUME_TEMPLATE_VERSION:resume-v1}
    cover-note-template-version: ${DOCUMENT_COVER_NOTE_TEMPLATE_VERSION:cover-note-v1}
    renderer-version: ${DOCUMENT_RENDERER_VERSION:apache-v1}
    max-preview-characters: ${DOCUMENT_MAX_PREVIEW_CHARACTERS:4000}
    stale-after: ${DOCUMENT_STALE_AFTER:10m}
    contact-cache-hmac-key: ${DOCUMENT_CONTACT_CACHE_HMAC_KEY:}
    contact:
      email: ${DOCUMENT_CONTACT_EMAIL:}
      phone: ${DOCUMENT_CONTACT_PHONE:}
      github-url: ${DOCUMENT_CONTACT_GITHUB_URL:}
      linkedin-url: ${DOCUMENT_CONTACT_LINKEDIN_URL:}
      portfolio-url: ${DOCUMENT_CONTACT_PORTFOLIO_URL:}
  scheduling:
    fetch-cron: ${JOB_FETCH_CRON:0 0 */6 * * *}
    digest-cron: ${DAILY_DIGEST_CRON:0 0 9 * * *}
    stale-days: ${STALE_DAYS:30}
  search-terms:
    - Java Internship
    - Java Developer Intern
    - Java Trainee
    - Java Academy
    - Junior Java Developer
    - Entry-Level Java Developer
    - Backend Developer Intern
    - Fullstack Developer Intern
    - Software Engineer Intern
    - Graduate Software Engineer
    - Junior Backend Developer
    - Spring Boot Internship
    - Mentorship
    - Apprenticeship
    - Trainee Program
  locations: [Bucharest, București, Romania, Remote Romania, Hybrid Bucharest]
